# Render Infrastructure-as-Code Blueprint
# https://docs.render.com/infrastructure-as-code
#
# Deploy: push to GitHub, connect repo in Render dashboard,
# or use `render blueprint apply` with the Render CLI.

databases:
  - name: ngs-platform-db
    plan: free          # free tier: 256MB, 1GB storage, 90-day expiry
    databaseName: ngs_platform
    user: ngs_admin
    region: oregon

services:
  - type: web
    name: ngs-platform
    runtime: node
    plan: free          # free tier: 750 hrs/month, spins down after inactivity
    region: oregon
    buildCommand: npm ci && npm run build && cd server && npm ci && npm run build
    startCommand: cd server && node dist/db/migrate.js && node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"
      - key: DATABASE_URL
        fromDatabase:
          name: ngs-platform-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true     # Render auto-generates a random secret
      - key: CORS_ORIGIN
        value: ""               # empty = same-origin (frontend served by Express)
    autoDeploy: true            # auto-deploy on push to connected branch
