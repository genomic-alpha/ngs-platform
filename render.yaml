# Render Infrastructure-as-Code Blueprint
# https://docs.render.com/infrastructure-as-code
#
# Deploy: push to GitHub, connect repo in Render dashboard,
# or use `render blueprint apply` with the Render CLI.

databases:
  - name: ngs-platform-db
    plan: free
    databaseName: ngs_platform
    user: ngs_admin

services:
  - type: web
    name: ngs-platform
    env: node
    plan: free
    buildCommand: npm ci && npm run build && cd server && npm ci && npm run build
    startCommand: cd server && node dist/db/migrate.js && node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"
      - key: DATABASE_URL
        fromDatabase:
          name: ngs-platform-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: ""
